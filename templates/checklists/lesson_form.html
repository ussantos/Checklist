{% extends "base.html" %}
{% block content %}
<div class="page-title">
  <div>
    <h1>{{ title }}</h1>
    <p class="muted">Aulas regulares vêm do Sponte. Cadastre aqui somente Aulas Experimentais ou Play vinculadas a uma oportunidade.</p>
  </div>
  <a class="btn" href="{% url 'pedagogical_class_schedule' %}">Voltar</a>
</div>

<section class="panel">
  <form method="post" class="form-grid">
    {% csrf_token %}
    {% if form.non_field_errors %}<div class="form-errors">{{ form.non_field_errors }}</div>{% endif %}
    {{ form.as_p }}
    <button class="btn primary" type="submit">{{ submit_label }}</button>
  </form>
</section>
{% endblock %}
