{% extends "base.html" %}
{% block content %}
<div class="page-title">
  <div>
    <h1>{{ title }}</h1>
    <p class="muted">Cadastre janelas de até 2 horas para uso na agenda.</p>
  </div>
  <a class="btn" href="{% url 'pedagogical_time_slots' %}">Voltar</a>
</div>

<section class="panel">
  <form method="post" class="form-grid">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn primary" type="submit">{{ submit_label }}</button>
  </form>
</section>
{% endblock %}
